name: Build

on:
  push:
    branches: [master]
    tags: [v*]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Win7+ (MSVC 2022) ──
          - os: windows-2022
            qt_version: 5.15.2
            arch: x64
            artifact: qitools-win-x64
          - os: windows-2022
            qt_version: 5.15.2
            arch: x86
            artifact: qitools-win-x86
          # ── WinXP (MSVC 2017 toolset, Qt 5.6) ──
          - os: windows-2022
            qt_version: 5.6.3
            cmake_toolset: v141_xp
            arch: x86
            artifact: qitools-win-xp
            experimental: true
          # ── Linux ──
          - os: ubuntu-22.04
            qt_version: 5.15.2
            artifact: qitools-linux
          # ── Linux ARM64 ──
          - os: ubuntu-24.04-arm
            artifact: qitools-linux-arm64
            qt_from_apt: true
          # ── macOS (ARM) ──
          - os: macos-latest
            qt_version: 5.15.2
            artifact: qitools-macos
    continue-on-error: ${{ matrix.experimental || false }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install v141_xp component
        if: matrix.cmake_toolset == 'v141_xp'
        shell: powershell
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe" modify --installPath $vsPath --add Microsoft.VisualStudio.Component.VC.v141.xp --quiet --norestart --nocache --wait

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch || 'x64' }}

      - name: Install Qt (prebuilt)
        if: ${{ !matrix.qt_from_apt }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          target: desktop
          cache: true
          aqtversion: ${{ matrix.qt_version == '5.6.3' && '==2.1.0' || '' }}

      - name: Install Qt (apt)
        if: matrix.qt_from_apt
        run: sudo apt-get update && sudo apt-get install -y qtbase5-dev qttools5-dev

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libfontconfig1-dev libfreetype6-dev libxcb1-dev libxcb-keysyms1-dev libxcb-xfixes0-dev

      - name: CMake configure (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cmake -S src -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch == 'x86' && 'Win32' || 'x64' }} ${CMAKE_TOOLSET:+-T $CMAKE_TOOLSET} -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
        env:
          CMAKE_TOOLSET: ${{ matrix.cmake_toolset }}

      - name: CMake configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -S src -B build -DCMAKE_BUILD_TYPE=Release ${{ !matrix.qt_from_apt && '-DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"' || '' }} -DCMAKE_CXX_FLAGS="-include limits"

      - name: CMake configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S src -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: CMake build
        run: cmake --build build --config Release -j4

      # ── Deploy & Package ──

      - name: windeployqt
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp resource/toolsimage.ico bin/
          windeployqt --no-translations --plugindir bin/plugins bin/qitools-msvc.exe

      - name: macdeployqt
        if: runner.os == 'macOS'
        run: macdeployqt bin/qitools-clang.app -dmg

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cd bin && 7z a ../${{ matrix.artifact }}.zip qitools-msvc.exe qitools-msvc-d.exe plugins/ translations/ *.dll 2>/dev/null || true

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cd bin && tar czf ../${{ matrix.artifact }}.tar.gz qitools-gnu qitools-gnu.app/Contents/MacOS/plugins/ translations/

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cp bin/qitools-clang.dmg ${{ matrix.artifact }}.dmg

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            qitools-win-x64/*
            qitools-win-x86/*
            qitools-win-xp/*
            qitools-linux/*
            qitools-linux-arm64/*
            qitools-macos/*
