name: Build

on:
  push:
    branches: [master]
    tags: [v*]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Win7+ (MSVC 2022) ──
          - os: windows-2022
            qt_version: 5.15.2
            arch: x64
            artifact: qitools-win-x64
          - os: windows-2022
            qt_version: 5.15.2
            arch: x86
            artifact: qitools-win-x86
          # ── WinXP (MSVC 2017 toolset, Qt 5.6) — disabled ──
          # - os: windows-2022
          #   qt_version: 5.6.3
          #   cmake_toolset: v141_xp
          #   arch: x86
          #   artifact: qitools-win-xp
          #   experimental: true
          # ── Linux ──
          - os: ubuntu-22.04
            qt_version: 5.15.2
            artifact: qitools-linux
          # ── Linux ARM64 ──
          - os: ubuntu-24.04-arm
            artifact: qitools-linux-arm64
            qt_from_apt: true
          # ── macOS (x86_64, Qt 5.15 has no arm64 prebuild) ──
          - os: macos-26-intel
            artifact: qitools-macos
            qt_from_brew: true
    continue-on-error: ${{ matrix.experimental || false }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install v141_xp component
        if: matrix.cmake_toolset == 'v141_xp'
        shell: powershell
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe" modify --installPath $vsPath --add Microsoft.VisualStudio.Component.VC.v141.xp --quiet --norestart --nocache --wait

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch || 'x64' }}

      - name: Install Qt (prebuilt)
        if: ${{ !matrix.qt_from_apt && !matrix.qt_from_brew && !(runner.os == 'Windows' && matrix.arch == 'x86') }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          target: desktop
          cache: true
          aqtversion: ${{ matrix.qt_version == '5.6.3' && '==2.0.0' || '' }}

      - name: Install Qt x86 (aqt)
        if: ${{ runner.os == 'Windows' && matrix.arch == 'x86' && !matrix.qt_from_apt }}
        shell: bash
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop ${{ matrix.qt_version }} win32_msvc2019
          echo "QT_ROOT_DIR=$(pwd)/${{ matrix.qt_version }}/msvc2019" >> "$GITHUB_ENV"
          echo "$(pwd)/${{ matrix.qt_version }}/msvc2019/bin" >> "$GITHUB_PATH"
      - name: Install Qt (brew)
        if: matrix.qt_from_brew
        run: |
          brew install qt@5
          echo "QT_ROOT_DIR=$(brew --prefix qt@5)" >> "$GITHUB_ENV"
          echo "$(brew --prefix qt@5)/bin" >> "$GITHUB_PATH"

      - name: Install Qt (apt)
        if: matrix.qt_from_apt
        run: sudo apt-get update && sudo apt-get install -y qtbase5-dev qttools5-dev qtmultimedia5-dev

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libfontconfig1-dev libfreetype6-dev libxcb1-dev libxcb-keysyms1-dev libxcb-xfixes0-dev qtmultimedia5-dev

      - name: Install linuxdeployqt
        if: runner.os == 'Linux' && runner.arch != 'ARM64'
        run: |
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage -O linuxdeployqt
          chmod +x linuxdeployqt
          sudo mv linuxdeployqt /usr/local/bin/

      - name: CMake configure (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cmake -S src -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch == 'x86' && 'Win32' || 'x64' }} ${CMAKE_TOOLSET:+-T $CMAKE_TOOLSET} -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" -DQITOOLS_MAC_BUNDLE=OFF
        env:
          CMAKE_TOOLSET: ${{ matrix.cmake_toolset }}

      - name: CMake configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -S src -B build -DCMAKE_BUILD_TYPE=Release ${{ !matrix.qt_from_apt && '-DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"' || '' }} -DCMAKE_CXX_FLAGS="-include limits" -DQITOOLS_MAC_BUNDLE=OFF

      - name: CMake configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S src -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: CMake build
        run: cmake --build build --config Release -j4

      # ── Deploy & Package ──

      - name: windeployqt
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp resource/toolsimage.ico bin/
          cd bin && windeployqt --no-translations --compiler-runtime qitools-msvc.exe

      - name: macdeployqt
        if: runner.os == 'macOS'
        run: macdeployqt bin/qitools-clang.app -dmg

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd bin
          # Remove debug exe if exists
          rm -f qitools-msvc-d.exe
          # Create distribution folder
          mkdir -p ../dist/${{ matrix.artifact }}
          cp -r qitools-msvc.exe plugins/ translations/ *.dll ../dist/${{ matrix.artifact }}/
          # Copy Qt plugins (platforms, styles, etc.)
          cp -r platforms/ styles/ ../dist/${{ matrix.artifact }}/ 2>/dev/null || true

      - name: Package (Linux)
        if: runner.os == 'Linux' && runner.arch != 'ARM64'
        run: |
          mkdir -p AppDir/usr/bin/plugins AppDir/usr/share/translations AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp bin/qitools-gnu AppDir/usr/bin/
          cp -r bin/plugins/* AppDir/usr/bin/plugins/
          cp -r bin/translations/* AppDir/usr/share/translations/
          cat > AppDir/usr/share/applications/qitools.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Qitools
          Exec=qitools-gnu
          Icon=qitools
          Categories=Utility;
          EOF
          cp resource/toolsimage.svg AppDir/usr/share/icons/hicolor/256x256/apps/qitools.svg 2>/dev/null || true
          linuxdeployqt AppDir/usr/bin/qitools-gnu -bundle-non-qt-libs -no-strip
          cd AppDir && tar czf ../${{ matrix.artifact }}.tar.gz usr

      - name: Package (Linux ARM64)
        if: runner.os == 'Linux' && runner.arch == 'ARM64'
        run: cd bin && tar czf ../${{ matrix.artifact }}.tar.gz qitools-gnu plugins/ translations/

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cp bin/qitools-clang.dmg ${{ matrix.artifact }}.dmg

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows' && success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux' && success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS' && success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            qitools-win-x64/*
            qitools-win-x86/*
            # qitools-win-xp/*
            qitools-linux/qitools-linux.tar.gz
            qitools-linux-arm64/qitools-linux-arm64.tar.gz
            qitools-macos/qitools-macos.dmg
