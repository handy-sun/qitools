name: Build

on:
  push:
    branches: [master]
    tags: [v*]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Win7+ (MSVC 2022) ──
          - os: windows-2022
            qt_version: 5.15.2
            artifact: qitools-win-x64
          # ── WinXP (MSVC 2017 toolset, Qt 5.6) ──
          - os: windows-2022
            qt_version: 5.6.3
            cmake_toolset: v141_xp
            artifact: qitools-win-xp
            experimental: true
          # ── Linux ──
          - os: ubuntu-22.04
            qt_version: 5.15.2
            artifact: qitools-linux
          # ── macOS (x86_64) ──
          - os: macos-13
            qt_version: 5.15.2
            artifact: qitools-macos
    continue-on-error: ${{ matrix.experimental || false }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install v141_xp component
        if: matrix.cmake_toolset == 'v141_xp'
        shell: powershell
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe" modify --installPath $vsPath --add Microsoft.VisualStudio.Component.VC.v141.xp --quiet --norestart --nocache --wait

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          target: desktop
          cache: true
          aqtversion: ${{ matrix.qt_version == '5.6.3' && '==2.1.1' || '' }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libfontconfig1-dev libfreetype6-dev libxcb1-dev libxcb-keysyms1-dev libxcb-xfixes0-dev

      - name: CMake configure
        shell: bash
        run: |
          CMAKE_EXTRA=""
          if [ "$RUNNER_OS" = "Linux" ]; then
            CMAKE_EXTRA="-DCMAKE_CXX_FLAGS=-include\ limits"
          fi
          if [ "$RUNNER_OS" = "Windows" ]; then
            cmake -S src -B build -G "Visual Studio 17 2022" -A x64 ${CMAKE_TOOLSET:+-T $CMAKE_TOOLSET} -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" $CMAKE_EXTRA
          else
            cmake -S src -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" $CMAKE_EXTRA
          fi
        env:
          CMAKE_TOOLSET: ${{ matrix.cmake_toolset }}

      - name: CMake build
        run: cmake --build build --config Release -j4

      # ── Deploy & Package ──

      - name: windeployqt
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp resource/toolsimage.ico bin/
          windeployqt --no-translations --plugindir bin/plugins bin/qitools-msvc.exe

      - name: macdeployqt
        if: runner.os == 'macOS'
        run: macdeployqt bin/qitools-clang.app -dmg

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cd bin && 7z a ../${{ matrix.artifact }}.zip qitools-msvc.exe plugins/ translations/ *.dll

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cd bin && tar czf ../${{ matrix.artifact }}.tar.gz qitools-gcc plugins/ translations/

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cp bin/qitools-clang.dmg ${{ matrix.artifact }}.dmg

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            qitools-win-x64/*
            qitools-win-xp/*
            qitools-linux/*
            qitools-macos/*
