name: Build

on:
  push:
    branches: [master]
    tags: [v*]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Win7+ (MSVC 2022) ──
          - os: windows-2022
            qt_version: 5.15.2
            cmake_generator: Visual Studio 17 2022
            artifact: qitools-win-x64
          # ── WinXP (MSVC 2017 toolset, Qt 5.6) ──
          - os: windows-2022
            qt_version: 5.6.3
            cmake_generator: Visual Studio 17 2022
            cmake_toolset: v141_xp
            artifact: qitools-win-xp
          # ── Linux ──
          - os: ubuntu-22.04
            qt_version: 5.15.2
            artifact: qitools-linux
          # ── macOS (arm64) ──
          - os: macos-14
            qt_version: 5.15.2
            artifact: qitools-macos

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: ${{ matrix.cmake_toolset }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          target: desktop
          cache: true

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libfontconfig1-dev libfreetype6-dev libxcb1-dev libxcb-keysyms1-dev libxcb-xfixes0-dev

      - name: CMake configure
        run: cmake -S src -B build -G "${{ matrix.cmake_generator || 'Unix Makefiles' }}" -T ${{ matrix.cmake_toolset || '' }} -A x64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=${{ env.Qt5_DIR }}
        shell: bash

      - name: CMake build
        run: cmake --build build --config Release -j4

      # ── Deploy & Package ──

      - name: windeployqt
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp resource/toolsimage.ico bin/
          windeployqt --no-translations --plugindir bin/plugins bin/qitools-msvc.exe

      - name: macdeployqt
        if: runner.os == 'macOS'
        run: macdeployqt bin/qitools-clang.app -dmg

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cd bin && 7z a ../${{ matrix.artifact }}.zip qitools-msvc.exe plugins/ translations/ *.dll platforms/ styles/ imageformats/

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cd bin && tar czf ../${{ matrix.artifact }}.tar.gz qitools-gcc plugins/ translations/

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cp bin/qitools-clang.dmg ${{ matrix.artifact }}.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            qitools-win-x64/*
            qitools-win-xp/*
            qitools-linux/*
            qitools-macos/*
