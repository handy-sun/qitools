name: Build

on:
  push:
    branches: [master]
    tags: [v*]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Win7+ (MSVC 2022) ──
          - os: windows-2022
            qt_version: 5.15.2
            arch: x64
            artifact: qitools-win-x64
          - os: windows-2022
            qt_version: 5.15.2
            arch: x86
            artifact: qitools-win-x86
          # ── WinXP (MSVC 2017 toolset, Qt 5.6) — disabled ──
          # - os: windows-2022
          #   qt_version: 5.6.3
          #   cmake_toolset: v141_xp
          #   arch: x86
          #   artifact: qitools-win-xp
          #   experimental: true
          # ── Linux ──
          - os: ubuntu-22.04
            qt_version: 5.15.2
            artifact: qitools-linux
          # ── Linux ARM64 ──
          - os: ubuntu-24.04-arm
            artifact: qitools-linux-arm64
            qt_from_apt: true
          # ── macOS (x86_64, Qt 5.15 has no arm64 prebuild) ──
          - os: macos-26-intel
            artifact: qitools-macos
            qt_from_brew: true
    continue-on-error: ${{ matrix.experimental || false }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install v141_xp component
        if: matrix.cmake_toolset == 'v141_xp'
        shell: powershell
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe" modify --installPath $vsPath --add Microsoft.VisualStudio.Component.VC.v141.xp --quiet --norestart --nocache --wait

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch || 'x64' }}

      - name: Install Qt (prebuilt)
        if: ${{ !matrix.qt_from_apt && !matrix.qt_from_brew && !(runner.os == 'Windows' && matrix.arch == 'x86') }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          target: desktop
          cache: true
          aqtversion: ${{ matrix.qt_version == '5.6.3' && '==2.0.0' || '' }}

      - name: Install Qt x86 (aqt)
        if: ${{ runner.os == 'Windows' && matrix.arch == 'x86' && !matrix.qt_from_apt }}
        shell: bash
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop ${{ matrix.qt_version }} win32_msvc2019
          echo "QT_ROOT_DIR=$(pwd)/${{ matrix.qt_version }}/msvc2019" >> "$GITHUB_ENV"
          echo "$(pwd)/${{ matrix.qt_version }}/msvc2019/bin" >> "$GITHUB_PATH"
      - name: Install Qt (brew)
        if: matrix.qt_from_brew
        run: |
          brew install qt@5
          echo "QT_ROOT_DIR=$(brew --prefix qt@5)" >> "$GITHUB_ENV"
          echo "$(brew --prefix qt@5)/bin" >> "$GITHUB_PATH"

      - name: Install Qt (apt)
        if: matrix.qt_from_apt
        run: sudo apt-get update && sudo apt-get install -y qtbase5-dev qttools5-dev qtmultimedia5-dev

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libfontconfig1-dev libfreetype6-dev libxcb1-dev libxcb-keysyms1-dev libxcb-xfixes0-dev qtmultimedia5-dev libpulse-dev libasound2-dev

      - name: CMake configure (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cmake -S src -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch == 'x86' && 'Win32' || 'x64' }} ${CMAKE_TOOLSET:+-T $CMAKE_TOOLSET} -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" -DQITOOLS_MAC_BUNDLE=OFF
        env:
          CMAKE_TOOLSET: ${{ matrix.cmake_toolset }}

      - name: CMake configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -S src -B build -DCMAKE_BUILD_TYPE=Release ${{ !matrix.qt_from_apt && '-DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"' || '' }} -DCMAKE_CXX_FLAGS="-include limits" -DQITOOLS_MAC_BUNDLE=OFF

      - name: CMake configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S src -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: CMake build
        run: cmake --build build --config Release -j4

      # ── Deploy & Package ──

      - name: windeployqt
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp resource/toolsimage.ico bin/
          cd bin
          windeployqt --no-translations --compiler-runtime qitools-msvc.exe
          for plugin in plugins/*.dll; do
            windeployqt --no-translations --no-compiler-runtime --dir . "$plugin"
          done

      - name: macdeployqt
        if: runner.os == 'macOS'
        run: |
          mkdir -p bin/qitools-clang.app/Contents/MacOS/translations
          cp -r bin/translations/*.qm bin/qitools-clang.app/Contents/MacOS/translations/
          macdeployqt bin/qitools-clang.app -dmg -no-codesign

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd bin
          mkdir -p ../dist/${{ matrix.artifact }}
          cp qitools-msvc.exe ../dist/${{ matrix.artifact }}/
          cp *.dll ../dist/${{ matrix.artifact }}/
          cp -r plugins translations platforms ../dist/${{ matrix.artifact }}/
          cp -r styles ../dist/${{ matrix.artifact }}/ 2>/dev/null || true
          find ../dist/${{ matrix.artifact }}/plugins -type f \( -name "*.lib" -o -name "*.exp" \) -delete

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cd bin && tar czf ../${{ matrix.artifact }}.tar.gz qitools-gnu plugins/ translations/

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cp bin/qitools-clang.dmg ${{ matrix.artifact }}.dmg

      - name: Verify package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          test -f dist/${{ matrix.artifact }}/qitools-msvc.exe
          test -f dist/${{ matrix.artifact }}/platforms/qwindows.dll
          test -f dist/${{ matrix.artifact }}/plugins/audio.dll
          test -f dist/${{ matrix.artifact }}/plugins/codecconvert.dll
          test -f dist/${{ matrix.artifact }}/plugins/colortool.dll
          test -f dist/${{ matrix.artifact }}/plugins/cppcodegen.dll
          test -f dist/${{ matrix.artifact }}/plugins/glsltool.dll
          test -f dist/${{ matrix.artifact }}/plugins/imageconvert.dll
          test -f dist/${{ matrix.artifact }}/plugins/simpledownload.dll
          find dist/${{ matrix.artifact }} -maxdepth 1 -type f \( -name "Qt5Multimedia.dll" -o -name "Qt6Multimedia.dll" \) | grep .
          test -f dist/${{ matrix.artifact }}/translations/glsltool-zh_CN.qm
          ! find dist/${{ matrix.artifact }}/plugins -type f \( -name "*.lib" -o -name "*.exp" \) | grep .

      - name: Verify package (Linux)
        if: runner.os == 'Linux'
        run: |
          tar tzf ${{ matrix.artifact }}.tar.gz | grep -qx qitools-gnu
          tar tzf ${{ matrix.artifact }}.tar.gz | grep -qx plugins/libaudio.so
          tar tzf ${{ matrix.artifact }}.tar.gz | grep -qx plugins/libsimpledownload.so
          tar tzf ${{ matrix.artifact }}.tar.gz | grep -qx translations/glsltool-zh_CN.qm

      - name: Verify package (macOS)
        if: runner.os == 'macOS'
        run: |
          test -f bin/qitools-clang.app/Contents/MacOS/qitools-clang
          test -f bin/qitools-clang.app/Contents/MacOS/plugins/libaudio.dylib
          test -f bin/qitools-clang.app/Contents/MacOS/plugins/libsimpledownload.dylib
          test -f bin/qitools-clang.app/Contents/MacOS/translations/glsltool-zh_CN.qm

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows' && success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux' && success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS' && success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            qitools-win-x64/*
            qitools-win-x86/*
            # qitools-win-xp/*
            qitools-linux/qitools-linux.tar.gz
            qitools-linux-arm64/qitools-linux-arm64.tar.gz
            qitools-macos/qitools-macos.dmg
