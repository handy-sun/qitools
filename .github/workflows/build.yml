name: Build

on:
  push:
    branches: [master]
    tags: [v*]
    paths:
      - '.gitmodules'
      - '.github/workflows/build.yml'
      - 'CMake/**'
      - 'CMakeLists.txt'
      - 'qitools.pro'
      - 'qitools.pri'
      - 'resource/**'
      - 'scripts/**'
      - 'src/**'
  pull_request:
    branches: [master]
    paths:
      - '.gitmodules'
      - '.github/workflows/build.yml'
      - 'CMake/**'
      - 'CMakeLists.txt'
      - 'qitools.pro'
      - 'qitools.pri'
      - 'resource/**'
      - 'scripts/**'
      - 'src/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Win (MSVC 2022, Qt 6.7)
          - os: windows-2022
            qt_version: 6.7.2
            arch: x64
            artifact: qitools-win-x64
          # Linux (Qt 6 from apt)
          - os: ubuntu-24.04
            artifact: qitools-linux
            qt_from_apt: true
          # Linux AppImage (Qt 6 from apt)
          - os: ubuntu-24.04
            artifact: qitools-linux-appimage
            qt_from_apt: true
            appimage: true
          # Linux ARM64 (Qt 6 from apt)
          - os: ubuntu-24.04-arm
            artifact: qitools-linux-arm64
            qt_from_apt: true
          # macOS x86_64 (Qt 6 from brew)
          - os: macos-26-intel
            artifact: qitools-macos
            qt_from_brew: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch || 'x64' }}

      - name: Install Qt (prebuilt)
        if: ${{ !matrix.qt_from_apt && !matrix.qt_from_brew }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          target: desktop
          cache: true
          modules: qtmultimedia

      - name: Install Qt (brew)
        if: matrix.qt_from_brew
        run: |
          brew install qt
          echo "QT_ROOT_DIR=$(brew --prefix qt)" >> "$GITHUB_ENV"
          echo "$(brew --prefix qt)/bin" >> "$GITHUB_PATH"

      - name: Install Qt (apt)
        if: matrix.qt_from_apt
        run: sudo apt-get update && sudo apt-get install -y qt6-base-dev qt6-tools-dev qt6-l10n-tools qt6-multimedia-dev libqt6svg6-dev qt6-wayland

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libfontconfig1-dev libfreetype6-dev libxcb1-dev libxcb-keysyms1-dev libxcb-xfixes0-dev libxcb-cursor0 libpulse-dev libasound2-dev

      - name: Install AppImage tooling
        if: ${{ matrix.appimage }}
        run: |
          sudo apt-get update
          sudo apt-get install -y curl desktop-file-utils file libfuse2t64 patchelf
          curl -L https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -o linuxdeploy-x86_64.AppImage
          curl -L https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage -o linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: CMake configure (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cmake -S src -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch == 'x86' && 'Win32' || 'x64' }} -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" -DQITOOLS_MAC_BUNDLE=OFF

      - name: CMake configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -S src -B build -DCMAKE_BUILD_TYPE=Release ${{ !matrix.qt_from_apt && '-DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"' || '' }} -DCMAKE_CXX_FLAGS="-include limits" -DQITOOLS_MAC_BUNDLE=OFF

      - name: CMake configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S src -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: CMake build
        run: cmake --build build --config Release -j4

      # Deploy & Package

      - name: windeployqt
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp resource/toolsimage.ico bin/
          cd bin
          windeployqt --no-translations --compiler-runtime qitools-msvc.exe
          for plugin in plugins/*.dll; do
            windeployqt --no-translations --no-compiler-runtime --dir . "$plugin"
          done

      - name: Copy MSVC runtime
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $arch = '${{ matrix.arch || 'x64' }}'
          $redistRoot = $env:VCToolsRedistDir
          if (-not $redistRoot) {
            $redistRoot = Join-Path $env:VCINSTALLDIR 'Redist\MSVC'
          }
          if (-not (Test-Path $redistRoot)) {
            throw "Could not find MSVC redist root: $redistRoot"
          }

          $crtDir = Get-ChildItem -Path $redistRoot -Recurse -Directory |
            Where-Object { $_.FullName -match "\\$arch\\Microsoft\.VC\d+\.CRT$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $crtDir) {
            throw "Could not find MSVC CRT redist directory under $redistRoot"
          }

          Copy-Item -Path (Join-Path $crtDir.FullName '*.dll') -Destination bin -Force

      - name: macdeployqt
        if: runner.os == 'macOS'
        run: |
          mkdir -p bin/qitools-clang.app/Contents/MacOS/translations
          cp -r bin/translations/*.qm bin/qitools-clang.app/Contents/MacOS/translations/
          macdeployqt bin/qitools-clang.app -dmg -no-codesign

      - name: Deploy Linux Qt platform plugins
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          if command -v qtpaths6 >/dev/null 2>&1; then
            qt_plugin_dir="$(qtpaths6 --plugin-dir)"
          elif command -v qmake6 >/dev/null 2>&1; then
            qt_plugin_dir="$(qmake6 -query QT_INSTALL_PLUGINS)"
          else
            echo "::error::Could not find qtpaths6 or qmake6"
            exit 1
          fi

          copy_qt_plugin_dir() {
            local dir="$1"
            if [ -d "$qt_plugin_dir/$dir" ]; then
              mkdir -p "bin/$dir"
              cp -a "$qt_plugin_dir/$dir"/. "bin/$dir"/
            fi
          }

          copy_qt_plugin_dir platforms
          copy_qt_plugin_dir platformthemes
          copy_qt_plugin_dir xcbglintegrations
          copy_qt_plugin_dir wayland-shell-integration
          copy_qt_plugin_dir generic
          copy_qt_plugin_dir iconengines
          copy_qt_plugin_dir imageformats

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd bin
          mkdir -p ../dist/${{ matrix.artifact }}
          cp qitools-msvc.exe ../dist/${{ matrix.artifact }}/
          cp *.dll ../dist/${{ matrix.artifact }}/
          cp -r plugins translations platforms ../dist/${{ matrix.artifact }}/
          cp -r styles ../dist/${{ matrix.artifact }}/ 2>/dev/null || true
          find ../dist/${{ matrix.artifact }}/plugins -type f \( -name "*.lib" -o -name "*.exp" \) -delete

      - name: Package (Linux)
        if: ${{ runner.os == 'Linux' && !matrix.appimage }}
        run: |
          cd bin
          package_paths="qitools-gnu plugins translations platforms wayland-shell-integration"
          for optional_dir in platformthemes xcbglintegrations generic iconengines imageformats; do
            if [ -d "$optional_dir" ]; then
              package_paths="$package_paths $optional_dir"
            fi
          done
          tar czf ../${{ matrix.artifact }}.tar.gz $package_paths

      - name: Package (Linux AppImage)
        if: ${{ matrix.appimage }}
        env:
          EXTRA_PLATFORM_PLUGINS: libqwayland-egl.so;libqwayland-generic.so
          EXTRA_QT_PLUGINS: wayland-shell-integration
          LDAI_NO_APPSTREAM: '1'
          LDAI_OUTPUT: qitools-linux-x86_64.AppImage
          LINUXDEPLOY_OUTPUT_APP_NAME: qitools
          LINUXDEPLOY_OUTPUT_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'continuous' }}
          VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'continuous' }}
        run: |
          set -euo pipefail

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps

          cp bin/qitools-gnu AppDir/usr/bin/qitools
          cp -a bin/plugins AppDir/usr/bin/plugins
          cp -a bin/translations AppDir/usr/bin/translations
          cp resource/toolsimage.svg AppDir/usr/share/icons/hicolor/scalable/apps/qitools.svg

          cat > AppDir/usr/share/applications/qitools.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=QiTools
          Exec=qitools
          Icon=qitools
          Categories=Utility;Development;
          Terminal=false
          EOF
          sed -i 's/^          //' AppDir/usr/share/applications/qitools.desktop
          desktop-file-validate AppDir/usr/share/applications/qitools.desktop

          export QMAKE="$(command -v qmake6)"

          linuxdeploy_args=(
            --appimage-extract-and-run
            --appdir AppDir
            --executable AppDir/usr/bin/qitools
            --desktop-file AppDir/usr/share/applications/qitools.desktop
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/qitools.svg
          )
          while IFS= read -r plugin; do
            linuxdeploy_args+=(--library "$plugin")
          done < <(find AppDir/usr/bin/plugins -type f -name "*.so" | sort)

          ./linuxdeploy-x86_64.AppImage "${linuxdeploy_args[@]}" --plugin qt --output appimage
          test -s qitools-linux-x86_64.AppImage

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cp bin/qitools-clang.dmg ${{ matrix.artifact }}.dmg

      - name: Verify package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          require_file() {
            if [ ! -f "$1" ]; then
              echo "::error::Missing packaged file: $1"
              find dist/${{ matrix.artifact }} -maxdepth 3 -type f | sort
              exit 1
            fi
          }
          require_file dist/${{ matrix.artifact }}/qitools-msvc.exe
          require_file dist/${{ matrix.artifact }}/platforms/qwindows.dll
          require_file dist/${{ matrix.artifact }}/plugins/audio.dll
          require_file dist/${{ matrix.artifact }}/plugins/codecconvert.dll
          require_file dist/${{ matrix.artifact }}/plugins/colortool.dll
          require_file dist/${{ matrix.artifact }}/plugins/cppcodegen.dll
          require_file dist/${{ matrix.artifact }}/plugins/glsltool.dll
          require_file dist/${{ matrix.artifact }}/plugins/imageconvert.dll
          require_file dist/${{ matrix.artifact }}/plugins/simpledownload.dll
          require_file dist/${{ matrix.artifact }}/Qt6Multimedia.dll
          require_file dist/${{ matrix.artifact }}/vcruntime140.dll
          require_file dist/${{ matrix.artifact }}/msvcp140.dll
          require_file dist/${{ matrix.artifact }}/translations/glsltool-zh_CN.qm
          import_libs=$(find dist/${{ matrix.artifact }}/plugins -type f \( -name "*.lib" -o -name "*.exp" \))
          if [ -n "$import_libs" ]; then
            echo "::error::Import libraries leaked into package:"
            echo "$import_libs"
            exit 1
          fi

      - name: Archive package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.artifact }}" -DestinationPath "dist/${{ matrix.artifact }}.zip" -Force
          if (-not (Test-Path "dist/${{ matrix.artifact }}.zip")) {
            throw "Missing archive: dist/${{ matrix.artifact }}.zip"
          }

      - name: Verify package (Linux)
        if: ${{ runner.os == 'Linux' && !matrix.appimage }}
        run: |
          tar tzf ${{ matrix.artifact }}.tar.gz | grep -qx qitools-gnu
          tar tzf ${{ matrix.artifact }}.tar.gz | grep -qx plugins/libaudio.so
          tar tzf ${{ matrix.artifact }}.tar.gz | grep -qx plugins/libsimpledownload.so
          tar tzf ${{ matrix.artifact }}.tar.gz | grep -qx platforms/libqxcb.so
          tar tzf ${{ matrix.artifact }}.tar.gz | grep -Eq '^platforms/libqwayland-(egl|generic)\.so$'
          tar tzf ${{ matrix.artifact }}.tar.gz | grep -qx wayland-shell-integration/libxdg-shell.so
          tar tzf ${{ matrix.artifact }}.tar.gz | grep -qx translations/glsltool-zh_CN.qm

      - name: Verify package (Linux AppImage)
        if: ${{ matrix.appimage }}
        run: |
          set -euo pipefail
          chmod +x qitools-linux-x86_64.AppImage
          ./qitools-linux-x86_64.AppImage --appimage-extract >/dev/null
          test -f squashfs-root/usr/bin/qitools
          test -f squashfs-root/usr/bin/plugins/libaudio.so
          test -f squashfs-root/usr/bin/plugins/libsimpledownload.so
          test -f squashfs-root/usr/bin/translations/glsltool-zh_CN.qm
          find squashfs-root -path '*/platforms/libqxcb.so' -print -quit | grep -q .
          find squashfs-root -path '*/platforms/libqwayland-*.so' -print -quit | grep -q .
          find squashfs-root -path '*/wayland-shell-integration/libxdg-shell.so' -print -quit | grep -q .

      - name: Verify package (macOS)
        if: runner.os == 'macOS'
        run: |
          test -f bin/qitools-clang.app/Contents/MacOS/qitools-clang
          test -f bin/qitools-clang.app/Contents/MacOS/plugins/libaudio.dylib
          test -f bin/qitools-clang.app/Contents/MacOS/plugins/libsimpledownload.dylib
          test -f bin/qitools-clang.app/Contents/MacOS/translations/glsltool-zh_CN.qm

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows' && success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip

      - name: Upload artifact (Linux)
        if: ${{ runner.os == 'Linux' && !matrix.appimage && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (Linux AppImage)
        if: ${{ matrix.appimage && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: qitools-linux-x86_64.AppImage

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS' && success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            qitools-win-x64/qitools-win-x64.zip
            qitools-linux/qitools-linux.tar.gz
            qitools-linux-appimage/qitools-linux-x86_64.AppImage
            qitools-linux-arm64/qitools-linux-arm64.tar.gz
            qitools-macos/qitools-macos.dmg
