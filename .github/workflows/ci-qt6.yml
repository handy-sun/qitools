name: Build Qt6

on:
  push:
    branches: [qt6]
    tags: [v*]
  pull_request:
    branches: [qt6]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          ## ── Win (MSVC 2022, Qt 6.7) ──
          - os: windows-2022
            qt_version: 6.7.2
            arch: x64
            artifact: qitools-win-x64
          ## ── Linux (Qt 6 from apt) ──
          - os: ubuntu-24.04
            artifact: qitools-linux
            qt_from_apt: true
          ## ── Linux ARM64 (Qt 6 from apt) ──
          - os: ubuntu-24.04-arm
            artifact: qitools-linux-arm64
            qt_from_apt: true
          ## ── macOS x86_64 (Qt 6 from brew) ──
          - os: macos-26-intel
            artifact: qitools-macos
            qt_from_brew: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch || 'x64' }}

      - name: Install Qt (prebuilt)
        if: ${{ !matrix.qt_from_apt && !matrix.qt_from_brew }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          target: desktop
          cache: true
          modules: qtmultimedia

      - name: Install Qt (brew)
        if: matrix.qt_from_brew
        run: |
          brew install qt
          echo "QT_ROOT_DIR=$(brew --prefix qt)" >> "$GITHUB_ENV"
          echo "$(brew --prefix qt)/bin" >> "$GITHUB_PATH"

      - name: Install Qt (apt)
        if: matrix.qt_from_apt
        run: sudo apt-get update && sudo apt-get install -y qt6-base-dev qt6-tools-dev qt6-l10n-tools qt6-multimedia-dev libqt6svg6-dev

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libfontconfig1-dev libfreetype6-dev libxcb1-dev libxcb-keysyms1-dev libxcb-xfixes0-dev

      - name: CMake configure (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cmake -S src -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch == 'x86' && 'Win32' || 'x64' }} -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" -DQITOOLS_MAC_BUNDLE=OFF

      - name: CMake configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -S src -B build -DCMAKE_BUILD_TYPE=Release ${{ !matrix.qt_from_apt && '-DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"' || '' }} -DCMAKE_CXX_FLAGS="-include limits" -DQITOOLS_MAC_BUNDLE=OFF

      - name: CMake configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S src -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: CMake build
        run: cmake --build build --config Release -j4

      ## ── Deploy & Package ──

      - name: windeployqt
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp resource/toolsimage.ico bin/
          cd bin && windeployqt --no-translations --compiler-runtime qitools-msvc.exe

      - name: macdeployqt
        if: runner.os == 'macOS'
        run: macdeployqt bin/qitools-clang.app -dmg

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd bin
          # Remove debug exe if exists
          rm -f qitools-msvc-d.exe
          # Create distribution folder
          mkdir -p ../dist/${{ matrix.artifact }}
          cp -r qitools-msvc.exe plugins/ translations/ *.dll ../dist/${{ matrix.artifact }}/
          # Copy Qt plugins (platforms, styles, etc.)
          cp -r platforms/ styles/ ../dist/${{ matrix.artifact }}/ 2>/dev/null || true

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cd bin && tar czf ../${{ matrix.artifact }}.tar.gz qitools-gnu plugins/ translations/

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cp bin/qitools-clang.dmg ${{ matrix.artifact }}.dmg

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows' && success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux' && success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS' && success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            qitools-win-x64/*
            qitools-linux/qitools-linux.tar.gz
            qitools-linux-arm64/qitools-linux-arm64.tar.gz
            qitools-macos/qitools-macos.dmg
